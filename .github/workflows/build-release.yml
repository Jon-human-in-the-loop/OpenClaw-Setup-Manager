name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release to GitHub'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npx pnpm@10.4.1 install --frozen-lockfile

      - name: Build application
        run: npx pnpm@10.4.1 build

      - name: Build Linux installers
        run: npx pnpm@10.4.1 exec electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-installers
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest-linux.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npx pnpm@10.4.1 install --frozen-lockfile

      - name: Build application
        run: npx pnpm@10.4.1 build

      - name: Build Windows installer
        run: npx pnpm@10.4.1 exec electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-installers
          path: |
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
            dist-electron/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npx pnpm@10.4.1 install --frozen-lockfile

      - name: Build application
        run: npx pnpm@10.4.1 build

      - name: Build macOS installer
        run: npx pnpm@10.4.1 exec electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-installers
          path: |
            dist-electron/*.dmg
            dist-electron/*.dmg.blockmap
            dist-electron/latest-mac.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: installers
          merge-multiple: true

      - name: List all installer files
        run: ls -lhR installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            installers/*.exe
            installers/*.dmg
            installers/*.AppImage
            installers/*.deb
            installers/*.yml
            installers/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
